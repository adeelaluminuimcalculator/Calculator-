<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap');
  :root { --gold: #c9a84c; --gold-light: #e8c96a; --dark: #0f0f0f; --dark2: #1a1a1a; --dark3: #252525; --border: #333; --text: #e0e0e0; --muted: #888; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; padding: 16px; }
  .shop { text-align: center; background: var(--dark2); border: 1px solid var(--gold); border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; }
  .shop h2 { font-family: 'Teko', sans-serif; color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; }
  .shop p { color: var(--muted); font-size: 0.9rem; margin-top: 3px; }
  .header { text-align: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 2px solid var(--gold); }
  .header h1 { font-family: 'Teko', sans-serif; font-size: 2rem; color: var(--gold); letter-spacing: 3px; }
  .type-btns { display: flex; gap: 10px; margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--dark2); color: var(--muted); font-family: 'Teko', sans-serif; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; }
  .type-btn.active { border-color: var(--gold); color: var(--gold); background: #1e1a0f; }
  .window-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; position: relative; }
  .window-card h3 { font-family: 'Teko', sans-serif; color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 12px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .grp { flex: 1; min-width: 100px; }
  label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=number] { width: 100%; background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; padding: 9px 10px; color: var(--text); font-size: 1rem; font-family: 'Rajdhani', sans-serif; outline: none; }
  input[type=number]:focus { border-color: var(--gold); }
  .del-btn { position: absolute; top: 12px; right: 12px; background: #5a1a1a; color: #ff6b6b; border: none; border-radius: 6px; padding: 4px 10px; font-size: 0.85rem; cursor: pointer; font-family: 'Rajdhani', sans-serif; }
  .add-btn { width: 100%; background: var(--dark2); color: var(--gold); border: 1px dashed var(--gold); padding: 12px; border-radius: 8px; font-family: 'Teko', sans-serif; font-size: 1.2rem; letter-spacing: 2px; cursor: pointer; margin-bottom: 12px; }
  .calc-btn { width: 100%; background: var(--gold); color: var(--dark); border: none; padding: 13px; border-radius: 8px; font-family: 'Teko', sans-serif; font-size: 1.3rem; letter-spacing: 3px; cursor: pointer; margin-bottom: 16px; }
  .calc-btn:active { opacity: 0.85; }
  .result { display: none; }
  .win-result { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .win-result h4 { font-family: 'Teko', sans-serif; color: var(--gold); font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .brow { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .brow:last-child { border: none; }
  .bn { color: var(--muted); }
  .bv { color: var(--text); font-weight: 600; }
  .bvg { color: var(--gold); font-weight: 600; }
  .final-box { background: var(--gold); color: var(--dark); padding: 16px; border-radius: 10px; text-align: center; margin-top: 10px; }
  .final-box h2 { font-family: 'Teko', sans-serif; font-size: 1.8rem; letter-spacing: 3px; }
  .final-box p { font-size: 1.1rem; font-family: 'Teko', sans-serif; margin-top: 4px; }
  .shop-footer { text-align: center; background: var(--dark2); border: 1px solid var(--gold); border-radius: 10px; padding: 12px 16px; margin-top: 14px; }
  .shop-footer h3 { font-family: 'Teko', sans-serif; color: var(--gold); font-size: 1.3rem; letter-spacing: 2px; }
  .shop-footer p { color: var(--muted); font-size: 0.9rem; margin-top: 3px; }
  .reset-btn { width: 100%; background: #2a2a2a; color: var(--muted); border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-family: 'Teko', sans-serif; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; margin-top: 10px; }
  .type-badge { display: inline-block; background: var(--dark3); border: 1px solid var(--gold); color: var(--gold); border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; margin-left: 8px; }
</style>
</head>
<body>

<div class="shop">
  <h2>🏪 ADEEL WELDING & ALUMINIUM HOUSE</h2>
  <p>📞 0321-7378024</p>
</div>

<div class="header">
  <h1>🪟 CUSTOMER CALCULATOR</h1>
</div>

<div class="type-btns">
  <button class="type-btn active" id="btn-three" onclick="setType('three')">🪟 THREE TRACK</button>
  <button class="type-btn" id="btn-double" onclick="setType('double')">🪟 DOUBLE TRACK</button>
</div>

<div id="windows-container"></div>

<button class="add-btn" onclick="addWindow()">+ WINDOW ADD KAREIN</button>
<button class="calc-btn" onclick="calculate()">CALCULATE KAREIN ▶</button>

<div class="result" id="result">
  <div id="results-container"></div>
  <div class="final-box">
    <h2>GRAND TOTAL</h2>
    <p id="final-total">Rs. —</p>
  </div>
  <div class="shop-footer">
    <h3>🏪 ADEEL WELDING & ALUMINIUM HOUSE</h3>
    <p>📞 0321-7378024</p>
  </div>
  <button class="reset-btn" onclick="resetAll()">🔄 RESET KAREIN</button>
</div>

<script>
// Fixed values
var DISC = 0.32;
var GLASS_RATE = 390;
var ACC = 1800;

// Three Track rates
var T_rDC26F = 880, T_rDC30F = 754, T_rM23 = 354, T_rM28 = 431, T_rM24 = 420, T_rD29 = 274;

// Double Track rates
var D_rM26F = 680, D_rM30F = 612, D_rM23 = 354, D_rM28 = 431, D_rM24 = 420;

var winCount = 0;
var currentType = 'three';

function setType(type) {
  currentType = type;
  document.getElementById('btn-three').className = 'type-btn' + (type === 'three' ? ' active' : '');
  document.getElementById('btn-double').className = 'type-btn' + (type === 'double' ? ' active' : '');
  // Reset windows when type changes
  document.getElementById('windows-container').innerHTML = '';
  document.getElementById('result').style.display = 'none';
  winCount = 0;
  addWindow();
}

function addWindow() {
  winCount++;
  var div = document.createElement('div');
  div.className = 'window-card';
  div.id = 'win-' + winCount;
  div.innerHTML = '<h3>🪟 WINDOW ' + winCount + '</h3>' +
    '<button class="del-btn" onclick="delWindow(' + winCount + ')">✕ DELETE</button>' +
    '<div class="row">' +
    '<div class="grp"><label>Width (inches)</label><input type="number" id="w' + winCount + '" placeholder="48" min="1"></div>' +
    '<div class="grp"><label>Height (inches)</label><input type="number" id="h' + winCount + '" placeholder="48" min="1"></div>' +
    '</div>' +
    '<div class="row">' +
    '<div class="grp"><label>Quantity</label><input type="number" id="q' + winCount + '" placeholder="1" min="1" value="1"></div>' +
    '<div class="grp"><label>Labour (per sqft)</label><input type="number" id="l' + winCount + '" placeholder="0" min="0" value="0"></div>' +
    '</div>';
  document.getElementById('windows-container').appendChild(div);
}

function delWindow(n) {
  var el = document.getElementById('win-' + n);
  if (el) el.remove();
}

function calcThreeTrack(w, h, qty, labourRate) {
  var tDC26F = (w + 6) * qty / 12 * T_rDC26F;
  var tDC30F = ((w + 6) + (h + 6) + (h + 6)) * qty / 12 * T_rDC30F;
  var tM23   = (h * 2) * qty / 12 * T_rM23;
  var tM28   = (h * 2) * qty / 12 * T_rM28;
  var tM24   = (w * 2) * qty / 12 * T_rM24;
  var tD29   = ((h * 2) + w) * qty / 12 * T_rD29;
  var gross = tDC26F + tDC30F + tM23 + tM28 + tM24 + tD29;
  var netSections = gross - (gross * DISC);
  var glassSqft = ((w - 5) / 12) * ((h - 5) / 12) * qty;
  var glassAmt = glassSqft * GLASS_RATE;
  var accAmt = ACC * qty;
  var sqft = ((w + 3) / 12) * ((h + 3) / 12) * qty;
  var labourAmt = sqft * labourRate;
  return { netSections: netSections, glassAmt: glassAmt, accAmt: accAmt, labourAmt: labourAmt, total: netSections + glassAmt + accAmt + labourAmt, sqft: sqft };
}

function calcDoubleTrack(w, h, qty, labourRate) {
  var tM26F = (w + 6) * qty / 12 * D_rM26F;
  var tM30F = ((w + 6) + (h + 6) + (h + 6)) * qty / 12 * D_rM30F;
  var tM23  = (h * 2) * qty / 12 * D_rM23;
  var tM28  = (h * 2) * qty / 12 * D_rM28;
  var tM24  = (w * 2) * qty / 12 * D_rM24;
  var gross = tM26F + tM30F + tM23 + tM28 + tM24;
  var netSections = gross - (gross * DISC);
  var glassSqft = ((w - 5) / 12) * ((h - 5) / 12) * qty;
  var glassAmt = glassSqft * GLASS_RATE;
  var accAmt = ACC * qty;
  var sqft = ((w + 3) / 12) * ((h + 3) / 12) * qty;
  var labourAmt = sqft * labourRate;
  return { netSections: netSections, glassAmt: glassAmt, accAmt: accAmt, labourAmt: labourAmt, total: netSections + glassAmt + accAmt + labourAmt, sqft: sqft };
}

function calculate() {
  var cards = document.querySelectorAll('.window-card');
  if (cards.length === 0) { alert('Pehle window add karein!'); return; }

  var resultsHTML = '';
  var grandTotal = 0;
  var winNum = 0;
  var typeName = currentType === 'three' ? 'Three Track' : 'Double Track';

  cards.forEach(function(card) {
    var id = card.id.replace('win-', '');
    var w = parseFloat(document.getElementById('w' + id).value) || 0;
    var h = parseFloat(document.getElementById('h' + id).value) || 0;
    var qty = parseInt(document.getElementById('q' + id).value) || 1;
    var labour = parseFloat(document.getElementById('l' + id).value) || 0;
    if (!w || !h) return;
    winNum++;
    var r = currentType === 'three' ? calcThreeTrack(w, h, qty, labour) : calcDoubleTrack(w, h, qty, labour);
    grandTotal += r.total;
    resultsHTML +=
      '<div class="win-result">' +
      '<h4>🪟 WINDOW ' + winNum + ' — ' + w + '" × ' + h + '" (×' + qty + ') <span class="type-badge">' + typeName + '</span></h4>' +
      '<div class="brow"><span class="bn">Sections (after 32% disc)</span><span class="bv">Rs. ' + Math.round(r.netSections) + '</span></div>' +
      '<div class="brow"><span class="bn">Glass (' + (Math.round(r.sqft * 100) / 100) + ' sqft)</span><span class="bv">Rs. ' + Math.round(r.glassAmt) + '</span></div>' +
      '<div class="brow"><span class="bn">Accessories</span><span class="bv">Rs. ' + Math.round(r.accAmt) + '</span></div>' +
      '<div class="brow"><span class="bn">Labour</span><span class="bv">Rs. ' + Math.round(r.labourAmt) + '</span></div>' +
      '<div class="brow"><span class="bn" style="color:var(--gold)">Window Total</span><span class="bvg">Rs. ' + Math.round(r.total) + '</span></div>' +
      '</div>';
  });

  document.getElementById('results-container').innerHTML = resultsHTML;
  document.getElementById('final-total').textContent = 'Rs. ' + Math.round(grandTotal);
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  document.getElementById('windows-container').innerHTML = '';
  document.getElementById('results-container').innerHTML = '';
  document.getElementById('result').style.display = 'none';
  winCount = 0;
  addWindow();
}

addWindow();
</script>
</body>
</html>
